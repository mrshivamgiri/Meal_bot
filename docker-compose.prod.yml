# Production overrides — use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Requires DOMAIN env var in .env (e.g. DOMAIN=yourdomain.com)

services:
  # Disable test database
  test-db:
    profiles: ["disabled"]

  db:
    ports: !override []
    restart: unless-stopped

  backend:
    volumes: !override []
    ports: !override []
    restart: unless-stopped

  frontend:
    ports: !override []
    restart: unless-stopped

  caddy:
    # Pinned to 2.8.4 + digest. `caddy:2-alpine` let the major tag float
    # and could roll to a new minor without a review. Digest pin makes
    # rebuilds reproducible across the Hetzner box and local/CI.
    image: caddy:2.8.4-alpine@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
