services:
  db:
    image: pgvector/pgvector:0.8.2-pg15@sha256:7f5681e45237acdf546cf7cdc0dfc0ed7752ede857fda6e54f6ea21b936f8742
    # statement_timeout caps any single query at 30s. A runaway ORM join or a
    # pgvector scan that picked the wrong plan can otherwise hold a connection
    # indefinitely and starve the small Hetzner box. 30s is well above any
    # legitimate hot-path query (p99 ≪ 1s) but small enough that a bad query
    # fails fast instead of piling up. Enforced server-side so it applies to
    # every caller, not just our SQLAlchemy engine.
    command: ["postgres", "-c", "statement_timeout=30000"]
    environment:
      # WARNING: POSTGRES_USER and POSTGRES_PASSWORD must be set in .env — no defaults provided
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mealbot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-mealbot}"]
      interval: 2s
      timeout: 5s
      retries: 10

  test-db:
    image: pgvector/pgvector:0.8.2-pg15@sha256:7f5681e45237acdf546cf7cdc0dfc0ed7752ede857fda6e54f6ea21b936f8742
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: mealbot_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d mealbot_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  # One-shot service that runs `alembic upgrade head` on every compose up
  # and exits. Backend waits for it via service_completed_successfully so
  # we can't serve requests against a schema that's behind main. When no
  # migrations are pending this is a ~1s no-op; when there are any, they
  # apply atomically before the app comes up. Loud failure if a migration
  # breaks — deploy aborts instead of silently shipping a stale schema.
  #
  # Emergency bypass (if a migration is broken and you need the backend
  # up against the old schema to roll forward by hand):
  #   docker compose up -d --no-deps backend
  # Prefer fixing the migration and re-running a normal `up -d --build`.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      secrets:
        - hf_token
    # `timeout 120` caps a runaway migration (hung advisory lock, stalled
    # connection) at 2 minutes so the deploy fails loudly instead of
    # blocking backend startup forever. Real migrations on this box
    # finish in seconds. Raise only if a legitimate migration needs it —
    # and consider `op.execute("SET LOCAL statement_timeout = 0")` per
    # the template banner for long table rewrites.
    command: ["sh", "-c", "timeout 120 alembic upgrade head"]
    # Volume-mount alembic/ so a dev creating a new migration and running
    # `docker compose up -d` (without --build) still picks up the new
    # revision file — otherwise the migrate container starts from the
    # baked image, doesn't see the new file, exits 0, and the schema
    # silently stays behind. Read-only because migrate only reads
    # revisions; it writes to alembic_version via the db, not the fs.
    # In prod the host path is identical to the image layer (deploy.sh
    # does `git pull` before `up --build`) so the overlay is a no-op.
    volumes:
      - ./backend/alembic:/app/alembic:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mealbot}
    depends_on:
      db:
        condition: service_healthy
    # Don't restart on exit — "completed successfully" is the happy path.
    restart: "no"

  backend:
    build:
      context: ./backend  # This tells Docker to look INSIDE the backend folder
      dockerfile: Dockerfile
      secrets:
        - hf_token
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000" # Assuming you need to reach FastAPI from your host
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mealbot}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "5173:80"  # Map host 5173 to container 80
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:

secrets:
  hf_token:
    environment: HF_TOKEN