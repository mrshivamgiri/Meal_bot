services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      # WARNING: POSTGRES_USER and POSTGRES_PASSWORD must be set in .env — no defaults provided
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mealbot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-mealbot}"]
      interval: 2s
      timeout: 5s
      retries: 10

  test-db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: mealbot_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d mealbot_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend  # This tells Docker to look INSIDE the backend folder
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000" # Assuming you need to reach FastAPI from your host
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mealbot}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "5173:80"  # Map host 5173 to container 80
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata: