name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Pinned by SHA to v1.0.112 — the floating `v1` tag was advanced past
      # this point and the newer release ships a broken native installer
      # (https://github.com/anthropics/claude-code-action/issues/1254). Symptom:
      # the action exits with "ReferenceError: Claude Code native binary not
      # found at /home/runner/.local/bin/claude". Bump only after that issue
      # is resolved upstream.
      - uses: anthropics/claude-code-action@30544b674398ee15c84819bd87caf8a87e8c7b55  # v1.0.154
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            CI on this repo already enforces: pytest, mypy (strict), ruff, eslint,
            frontend build, gitleaks. Do NOT re-check those — focus your review on
            what CI cannot catch.

            Review priorities, in order:
            1. Correctness and edge cases — does the change do what its description claims? What breaks on the unhappy path?
            2. Security — per CLAUDE.md, treat all user input as malicious; external API/LLM/DB calls need timeouts + specific exceptions.
            3. Conventions from CLAUDE.md and .claude/rules/ — FastAPI Pydantic models, async discipline, structured LLM output, Dockerfile practices, conventional commits.
            4. Design smells — premature abstraction, dead code, hidden behavior, broken invariants.
            5. Migration & deploy risk — flag Alembic migrations that need a deployment note, flag changes that require host .env updates.

            Skip trivia (whitespace, obvious typos). Be direct and specific — quote file:line. Staff-engineer tone: if something is a production risk, say so.

            REVIEW-ONLY MODE — hard rules:
            - You are a reviewer, not an implementer. Do NOT attempt to write,
              edit, stage, commit, push, or rebase code. You have no write
              access to the repo and any such attempt will fail and pollute
              the review.
            - Do NOT claim to have made commits, fixes, or pushes. Do NOT
              reference commit SHAs you have not been shown — never invent
              them. If a fix is needed, describe the change in prose with the
              exact file:line and the snippet to apply, and let the human
              author commit it.
            - Do NOT include "Fix this →" links, claude.ai/code links, or any
              other call-to-action that triggers a follow-up agent. Your
              output is feedback in PR comments, nothing else.

            Post top-level feedback with `gh pr comment`. Use inline comments for specific code issues.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
