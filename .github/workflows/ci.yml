name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write CI .env
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=mealbot
          POSTGRES_PASSWORD=mealbotpw
          POSTGRES_DB=mealbot
          SECRET_KEY=ci-only-not-real-64-char-key-not-for-production-0123456789abcdef
          DEMO_MODE=false
          LLM_MOCK=true
          EOF

      - name: Build backend image with dev deps
        run: docker compose -f docker-compose.yml build --build-arg INSTALL_DEV=true backend

      - name: Start databases
        run: docker compose -f docker-compose.yml up -d db test-db

      - name: Wait for test-db
        run: |
          for i in {1..30}; do
            if docker compose -f docker-compose.yml exec -T test-db pg_isready -U testuser -d mealbot_test; then
              exit 0
            fi
            sleep 2
          done
          echo "test-db never became ready" >&2
          exit 1

      - name: Run pytest
        run: docker compose -f docker-compose.yml run --rm backend pytest

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --tail=200

  backend-types:
    name: backend mypy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run mypy
        # mypy does static analysis, so it doesn't need a live DB, but
        # importing app/core/config.py at module load evaluates `settings =
        # Settings()` which requires SECRET_KEY and DATABASE_URL. Provide
        # throwaway values so the import succeeds.
        env:
          SECRET_KEY: ci-only-not-real-64-char-key-not-for-production-0123456789abcdef
          DATABASE_URL: postgresql+psycopg://x:y@localhost/z
        run: mypy .

  backend-lint:
    name: backend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install ruff
        run: pip install -r requirements-dev.txt

      - name: Run ruff
        run: ruff check .

  frontend-build:
    name: frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  frontend-lint:
    name: frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
