services:
  backend:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"

  frontend:
    build:
      context: ./frontend
      target: build-stage  # Intercept the Dockerfile before it builds Nginx
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Anonymous volume to protect container dependencies
    ports:
      - "5174:5173"        # Override the 5173:80 mapping from the base compose file
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      # Same-origin in dev: leave VITE_API_BASE unset so api.ts uses "/api",
      # which vite's dev server proxies to the backend container. Cookies
      # stay SameSite=Lax, matching prod Caddy.